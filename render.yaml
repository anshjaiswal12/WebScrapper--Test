services:
  - type: web
    name: price-compare
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEMO_MODE
        value: true
      - key: HEADLESS
        value: true
      - key: LOG_LEVEL
        value: INFO
